<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bg:#0b0d12; --panel:#141720; --border:#2a2f3a; --text:#ecf0ff; --muted:#9ba6bf; --accent:#ff5722; }
    body { background: radial-gradient(circle at top right, #1b2233 0%, #0b0d12 42%, #07090d 100%); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .gate-card { width:100%; max-width:420px; padding:2rem 1.6rem; border-radius:1rem; background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); border:1px solid var(--border); box-shadow:0 18px 40px rgba(0,0,0,.38); }
    .title { font-size:1.35rem; font-weight:700; margin-bottom:.4rem; text-align:center; color:var(--accent); }
    .muted { color:var(--muted); font-size:.9rem; text-align:center; margin-bottom:1rem; }
    .form-control { background:#0f131b; border:1px solid var(--border); color:var(--text); }
  </style>
</head>
<body>
<div class="gate-card">
  <h1 class="title">Admin Access</h1>
  <p class="muted">Enter the admin password to manage users.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'secondary' if category=='info' else category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('admin_users') }}">
    <input type="hidden" name="action" value="unlock">
    <div class="mb-3">
      <label class="form-label">Admin password</label>
      <input class="form-control" type="password" name="admin_secret" required autofocus>
    </div>
    <button class="btn btn-warning w-100" type="submit">Unlock Admin</button>
  </form>

  <div class="mt-3 text-center small" style="color:var(--muted)">
    If you are not the admin, go back to <a href="{{ url_for('login') }}">Login page</a>.
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
